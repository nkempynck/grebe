<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Redirect legacy grebe-games.pages.dev visitors to the canonical domain,
      // preserving their path, query, and hash. Fires only on the old host, so
      // grebegames.com is never affected. Allowed by its own CSP hash below.
      if (location.hostname === "grebe-games.pages.dev") {
        location.replace(
          "https://grebegames.com" + location.pathname + location.search + location.hash
        );
      }
    </script>
    <title>Grebe — daily tree-of-life game</title>
    <meta name="description" content="Daily puzzle games played on the tree of life." />

    <!-- Static favicon for crawlers/no-JS; main.tsx swaps in the hashed asset at
         runtime for real browsers. Served from /public. -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Link-preview cards (WhatsApp, iMessage, Slack, social). Crawlers read only
         static HTML, so the image is an absolute URL to a file served at the root. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Grebe" />
    <meta property="og:title" content="Grebe — daily tree-of-life games" />
    <meta property="og:description" content="Daily puzzle games played on the tree of life." />
    <meta property="og:url" content="https://grebegames.com" />
    <meta property="og:image" content="https://grebegames.com/logo.png" />
    <meta property="og:image:width" content="2267" />
    <meta property="og:image:height" content="2267" />
    <meta property="og:image:alt" content="The Grebe logo: a drawing of a Great Crested Grebe." />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Grebe — daily tree-of-life games" />
    <meta name="twitter:description" content="Daily puzzle games played on the tree of life." />
    <meta name="twitter:image" content="https://grebegames.com/logo.png" />
    <script>
      // Apply a remembered theme before first paint so a forced choice doesn't
      // flash the OS default. No stored value → CSS drives from prefers-color-scheme.
      try {
        var t = localStorage.getItem("grebe.theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
